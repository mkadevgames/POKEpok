<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POKEpok</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;text-align:center;overflow:hidden}
#start,#emulator{padding:20px}
#start h1,#emulator h1{font-size:32px;margin:10px;color:#a020f0}
#start p{font-size:18px}
input[type=file]{margin:15px 0;display:block;margin-left:auto;margin-right:auto}
button{background:#a020f0;color:#fff;border:none;padding:15px 30px;font-size:20px;margin:10px;border-radius:8px;cursor:pointer}
button:active{transform:scale(0.95)}
#game{width:720px;height:480px;max-width:100%;margin:0 auto;border:8px solid #00f;background:#001133;image-rendering:pixelated}
</style>
<script src="https://cdn.emulatorjs.org/stable/emulator.js"></script>
</head>
<body>
<div id="start">
<h1>POKEpok</h1>
<p>Carregue sua ROM de Pokémon (.gba)</p>
<input type="file" id="romInput" accept=".gba">
<button onclick="loadROM()">Carregar ROM e Jogar</button>
</div>
<div id="emulator" style="display:none">
<h1>POKEonline</h1>
<h2 id="romName" style="color:#ff0;margin-bottom:10px"></h2>
<div id="game"></div>
<div style="margin-top:15px">
<button onclick="exitToMenu()">Voltar ao Menu</button>
</div>
</div>
<script>
function initDB(){
return new Promise((resolve,reject)=>{
const request=indexedDB.open('POKEonlineDB',1)
request.onupgradeneeded=function(e){
const db=e.target.result
if(!db.objectStoreNames.contains('roms')){
db.createObjectStore('roms',{keyPath:'id'})
}
}
request.onsuccess=function(e){
resolve(e.target.result)
}
request.onerror=function(e){
reject(e)
}
})
}
async function saveROM(file){
const db=await initDB()
const reader=new FileReader()
reader.onload=async function(){
const base64=reader.result.split(',')[1]
const romData={id:'currentRom',filename:file.name,base64:base64}
const tx=db.transaction('roms','readwrite')
tx.objectStore('roms').put(romData)
tx.oncomplete=function(){
location.reload()
}
}
reader.readAsDataURL(file)
}
async function getSavedROM(){
const db=await initDB()
return new Promise((resolve)=>{
const tx=db.transaction('roms','readonly')
const request=tx.objectStore('roms').get('currentRom')
request.onsuccess=function(){
resolve(request.result)
}
})
}
async function init(){
const saved=await getSavedROM()
if(saved){
document.getElementById('start').style.display='none'
document.getElementById('emulator').style.display='block'
document.getElementById('romName').textContent=saved.filename
const gameUrl='data:application/octet-stream;base64,'+saved.base64
window.EJS_player='#game'
window.EJS_core='gba'
window.EJS_gameUrl=gameUrl
window.EJS_gameName=saved.filename
}
}
function loadROM(){
const file=document.getElementById('romInput').files[0]
if(!file)return
saveROM(file)
}
function exitToMenu(){
document.getElementById('emulator').style.display='none'
document.getElementById('start').style.display='block'
}
window.onload=init
</script>
</body>
</html>
